<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Team | Alloy River</title>
<meta name="description" content="The team behind Alloy River." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/styles.css">
<link rel="icon" href="assets/img/logo.svg">
</head>
<body>

<section class="page-hero">
  <div class="wrap">
    <p class="eyebrow reveal">Our team</p>
    <h1 class="reveal">The team behind Alloy River.</h1>
    <p class="reveal">We're a team across San Francisco, Toronto, and Montréal.</p>
  </div>
</section>

<section>
  <div class="wrap">
    <div class="team-grid" id="teamGrid"></div>
  </div>
</section>

<section class="cta">
  <div class="wrap">
    <h2 class="reveal">Want to join us?</h2>
    <p class="reveal">We're actively hiring across Hunters, Builders, and Stewards.</p>
    <a class="btn-solid reveal" href="careers.html">See open roles</a>
  </div>
</section>

<!-- =========================================================
     EDIT TEAM MEMBERS HERE
     - name:  full name
     - title: role / team
     - photo: filename in assets/img/team/  (leave "" to show initials)
     - bio:   optional one-liner ("" to hide)
     ========================================================= -->
<script>
  // bio: one-line description ("" to hide).  li: LinkedIn URL ("" to hide).
  // NOTE: the founders' LinkedIn below points to the company page as a
  // placeholder, replace each with the person's personal profile URL.
  const TEAM = [
    {name:"Gui Laliberte", title:"CEO & Co-Founder", photo:"gui-laliberte.png", bio:"Leads the company and its partnerships.", li:"https://www.linkedin.com/company/alloyriver"},
    {name:"Jeremy Tupper", title:"CTO & Co-Founder", photo:"jeremy-tupper.jpg", bio:"Leads product and engineering.", li:"https://www.linkedin.com/company/alloyriver", zoom:1.5, bw:true, down:25},
    {name:"James", title:"Head of Product", photo:"james.jpg", bio:"Leads product.", li:""},
    {name:"Add Name", title:"Head of Finance",       photo:"", bio:"", li:""},
    {name:"Add Name", title:"Member of Technical Staff", photo:"", bio:"", li:""},
    {name:"Add Name", title:"Corporate Development",  photo:"", bio:"", li:""},
    {name:"Add Name", title:"Chief of Staff",        photo:"", bio:"", li:""},
    {name:"Add Name", title:"General Counsel",       photo:"", bio:"", li:""}
  ];
  function initials(n){return n.split(/\s+/).map(w=>w[0]||"").join("").slice(0,2).toUpperCase();}
  function imgStyle(m){
    const t=[];
    if(m.down)t.push("translateY("+m.down+"%)");
    if(m.zoom)t.push("scale("+m.zoom+")");
    let s="";
    if(t.length)s+="transform:"+t.join(" ")+";";
    if(m.bw)s+="filter:grayscale(1);";
    return s;
  }
  document.getElementById("teamGrid").innerHTML = TEAM.map(m=>`
    <div class="member reveal">
      <div class="photo">
        ${m.photo
          ? `<img src="assets/img/team/${m.photo}" alt="${m.name}" style="${imgStyle(m)}"
                  onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
             <span class="initials" style="display:none">${initials(m.name)}</span>`
          : `<span class="initials">${initials(m.name)}</span>`}
      </div>
      <h3>${m.name}</h3>
      <div class="role-title">${m.title}</div>
      ${m.li?`<div class="links"><a href="${m.li}" target="_blank" rel="noopener" aria-label="${m.name} on LinkedIn"><svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor" aria-hidden="true"><path d="M20.45 20.45h-3.56v-5.57c0-1.33-.02-3.04-1.85-3.04-1.85 0-2.14 1.45-2.14 2.94v5.67H9.34V9h3.42v1.56h.05c.48-.9 1.64-1.85 3.37-1.85 3.6 0 4.27 2.37 4.27 5.46v6.28zM5.34 7.43a2.06 2.06 0 1 1 0-4.13 2.06 2.06 0 0 1 0 4.13zM7.12 20.45H3.56V9h3.56v11.45zM22.22 0H1.77C.79 0 0 .77 0 1.73v20.54C0 23.23.79 24 1.77 24h20.45c.98 0 1.78-.77 1.78-1.73V1.73C24 .77 23.2 0 22.22 0z"/></svg></a></div>`:""}
    </div>`).join("");
</script>

<script src="assets/js/main.js"></script>
</body>
</html>
